<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robot Vacuum Explorer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a1a18; color: #e0ddd4; font-family: system-ui, sans-serif; padding: 16px; }
h1 { font-size: 16px; font-weight: 500; color: #c2c0b6; margin-bottom: 12px; letter-spacing: 0.3px; }
#stats-row { display: flex; gap: 20px; margin-bottom: 10px; }
.stat { display: flex; flex-direction: column; gap: 2px; }
.stat .sl { font-size: 11px; color: #888780; }
.stat .sv { font-size: 20px; font-weight: 500; color: #e0ddd4; }
#legend { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 10px; }
.lg { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #888780; }
.lb { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }
#panels { display: flex; gap: 14px; margin-bottom: 10px; }
.pcol { display: flex; flex-direction: column; gap: 5px; }
.plbl { font-size: 12px; color: #888780; text-align: center; }
canvas { border-radius: 8px; border: 1px solid #333; display: block; }
#log { font-size: 12px; color: #888780; font-family: monospace; min-height: 18px; margin-bottom: 10px; }
#controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
button {
  font-size: 13px; padding: 7px 14px; border-radius: 7px;
  border: 1px solid #444; background: #2a2a28; color: #e0ddd4;
  cursor: pointer; transition: background 0.15s;
}
button:hover { background: #383836; }
button:active { transform: scale(0.97); }
#btnStart { border-color: #3B6D11; color: #9FE1CB; }
#btnStart:hover { background: #1e3018; }
label { font-size: 12px; color: #888780; display: flex; align-items: center; gap: 7px; }
input[type=range] { width: 80px; accent-color: #3B6D11; }
</style>
</head>
<body>
<h1>Robot Vacuum Explorer</h1>
<div id="stats-row">
  <div class="stat"><span class="sl">Steps</span><span class="sv" id="vSteps">0</span></div>
  <div class="stat"><span class="sl">Coverage</span><span class="sv" id="vCov">0%</span></div>
  <div class="stat"><span class="sl">Frontiers</span><span class="sv" id="vFront">0</span></div>
  <div class="stat"><span class="sl">Phase</span><span class="sv" id="vPhase" style="font-size:14px">idle</span></div>
</div>
<div id="legend">
  <div class="lg"><div class="lb" style="background:#27500A"></div>Robot</div>
  <div class="lg"><div class="lb" style="background:#97C459"></div>Start point</div>
  <div class="lg"><div class="lb" style="background:#9FE1CB"></div>Visited (clean)</div>
  <div class="lg"><div class="lb" style="background:#E1F5EE"></div>Free (mapped)</div>
  <div class="lg"><div class="lb" style="background:#888780"></div>Unknown</div>
  <div class="lg"><div class="lb" style="background:#EF9F27"></div>Frontier</div>
  <div class="lg"><div class="lb" style="background:#378ADD"></div>Return path</div>
  <div class="lg"><div class="lb" style="background:#2C2C2A"></div>Wall</div>
</div>
<div id="panels">
  <div class="pcol">
    <div class="plbl">Real world (hidden from robot)</div>
    <canvas id="cW"></canvas>
  </div>
  <div class="pcol">
    <div class="plbl">Robot's built map</div>
    <canvas id="cM"></canvas>
  </div>
</div>
<div id="log">Press Start to begin exploration...</div>
<div id="controls">
  <button id="btnStart" onclick="startStop()">Start</button>
  <button onclick="doStep();draw()">Step</button>
  <button onclick="step10()">Step x10</button>
  <button onclick="newMap()">New map</button>
  <label>
    Speed
    <input type="range" id="spd" min="1" max="9" value="5" step="1">
    <span id="spdLbl">5</span>
  </label>
</div>

<script>
const ROWS=22, COLS=22, SZ=20;
const cW=document.getElementById('cW');
const cM=document.getElementById('cM');
const gW=cW.getContext('2d');
const gM=cM.getContext('2d');
cW.width=cM.width=COLS*SZ;
cW.height=cM.height=ROWS*SZ;

const L_OCC=1.4, L_FREE=-0.55, L_MIN=-5, L_MAX=5, SENS=5;
const D4=[[-1,0],[1,0],[0,-1],[0,1]];
const HOME={r:1,c:1};

let world, lo, bot, steps, bumps, ticker, trail, retPath, pendPath, totalFree, phase;
let running=false;

function K(r,c){return r*COLS+c;}
function P(r,c){return 1-1/(1+Math.exp(lo[r][c]));}
function inB(r,c){return r>=0&&r<ROWS&&c>=0&&c<COLS;}
function passable(r,c){return inB(r,c)&&P(r,c)<0.55;}
function isUnk(r,c){return Math.abs(lo[r][c])<0.15;}

function makeWorld(){
  world=Array.from({length:ROWS},(_,r)=>
    Array.from({length:COLS},(_,c)=>(r===0||r===ROWS-1||c===0||c===COLS-1)?1:0));

  const walls=[
    [2,2,9,'v'],[2,7,8,'v'],[2,12,9,'v'],[2,17,7,'v'],
    [5,2,10,'h'],[10,2,10,'h'],[15,4,11,'h'],[18,3,9,'h'],
    [6,10,8,'v'],[11,15,7,'v'],[7,5,5,'h'],[14,12,6,'v'],
  ];
  walls.forEach(([r,c,l,d])=>{
    for(let i=0;i<l;i++){
      const nr=d==='v'?r+i:r, nc=d==='h'?c+i:c;
      if(nr>0&&nr<ROWS-1&&nc>0&&nc<COLS-1) world[nr][nc]=1;
    }
    const g=1+Math.floor(Math.random()*(l-2));
    const gr=d==='v'?r+g:r, gc=d==='h'?c+g:c;
    if(gr>0&&gr<ROWS-1&&gc>0&&gc<COLS-1) world[gr][gc]=0;
  });
  world[HOME.r][HOME.c]=0;

  // count reachable
  const vis=new Set([K(HOME.r,HOME.c)]);
  const q=[[HOME.r,HOME.c]];
  while(q.length){
    const[r,c]=q.shift();
    for(const[dr,dc]of D4){
      const nr=r+dr,nc=c+dc,nk=K(nr,nc);
      if(!vis.has(nk)&&inB(nr,nc)&&world[nr][nc]===0){vis.add(nk);q.push([nr,nc]);}
    }
  }
  totalFree=vis.size;
}

function initState(){
  lo=Array.from({length:ROWS},()=>new Float32Array(COLS));
  bot={r:HOME.r,c:HOME.c};
  steps=0; bumps=0; phase='explore';
  trail=new Set([K(HOME.r,HOME.c)]);
  retPath=[]; pendPath=[];
  scan(); updateUI(); draw();
}

function scan(){
  for(let dr=-SENS;dr<=SENS;dr++) for(let dc=-SENS;dc<=SENS;dc++){
    if(Math.abs(dr)+Math.abs(dc)>SENS) continue;
    const tr=bot.r+dr, tc=bot.c+dc;
    if(!inB(tr,tc)) continue;
    const ray=bres(bot.r,bot.c,tr,tc);
    let hit=false;
    for(let i=1;i<ray.length;i++){
      const[rr,cc]=ray[i];
      if(!inB(rr,cc)) break;
      if(world[rr][cc]===1){lo[rr][cc]=Math.min(L_MAX,lo[rr][cc]+L_OCC);hit=true;break;}
      else lo[rr][cc]=Math.max(L_MIN,lo[rr][cc]+L_FREE);
    }
    if(!hit){const[er,ec]=ray[ray.length-1];if(inB(er,ec))lo[er][ec]=Math.max(L_MIN,lo[er][ec]+L_FREE);}
  }
}

function bres(r0,c0,r1,c1){
  const cells=[[r0,c0]];
  let r=r0,c=c0;
  const dr=Math.abs(r1-r0),dc=Math.abs(c1-c0);
  const sr=r1>r0?1:-1,sc=c1>c0?1:-1;
  let e=dr-dc;
  while(r!==r1||c!==c1){
    const e2=2*e;
    if(e2>-dc){e-=dc;r+=sr;}
    if(e2<dc){e+=dr;c+=sc;}
    cells.push([r,c]);
  }
  return cells;
}

function frontiers(){
  const f=[];
  for(let r=1;r<ROWS-1;r++) for(let c=1;c<COLS-1;c++){
    if(!isUnk(r,c)) continue;
    if(D4.some(([dr,dc])=>{const nr=r+dr,nc=c+dc;return inB(nr,nc)&&P(nr,nc)<0.35;})) f.push([r,c]);
  }
  return f;
}

function bfsPath(sr,sc,goals,freeOnly){
  if(!goals.length) return null;
  const gs=new Set(goals.map(([r,c])=>K(r,c)));
  const dist={[K(sr,sc)]:0},par={},q=[[sr,sc]];
  while(q.length){
    const[r,c]=q.shift();
    if(gs.has(K(r,c))){
      const path=[[r,c]];let k=K(r,c);
      while(par[k]){const p=par[k];path.unshift(p);k=K(p[0],p[1]);}
      return path;
    }
    for(const[dr,dc]of D4){
      const nr=r+dr,nc=c+dc,nk=K(nr,nc);
      if(dist[nk]!==undefined) continue;
      if(nr<=0||nr>=ROWS-1||nc<=0||nc>=COLS-1) continue;
      const p=P(nr,nc);
      if(p>0.58) continue;
      if(freeOnly&&p>0.45) continue;
      dist[nk]=(dist[K(r,c)]||0)+1; par[nk]=[r,c]; q.push([nr,nc]);
    }
  }
  return null;
}

function covPct(){
  const vis=new Set([K(HOME.r,HOME.c)]);
  const q=[[HOME.r,HOME.c]];
  while(q.length){
    const[r,c]=q.shift();
    for(const[dr,dc]of D4){
      const nr=r+dr,nc=c+dc,nk=K(nr,nc);
      if(!vis.has(nk)&&inB(nr,nc)&&P(nr,nc)<0.45){vis.add(nk);q.push([nr,nc]);}
    }
  }
  return totalFree>0?Math.round(vis.size/totalFree*100):0;
}

function doStep(){
  if(phase==='done') return;

  if(phase==='return'){
    if(!retPath.length){phase='done';setLog('Map complete! Robot returned to start.');stopTimer();updateUI();return;}
    const[nr,nc]=retPath.shift();
    if(world[nr][nc]===1){
      lo[nr][nc]=L_MAX;
      const p=bfsPath(bot.r,bot.c,[[HOME.r,HOME.c]],true);
      retPath=p?p.slice(1):[];
    } else {
      bot.r=nr;bot.c=nc;steps++;trail.add(K(nr,nc));
    }
    scan(); updateUI();
    if(bot.r===HOME.r&&bot.c===HOME.c){phase='done';setLog('Map complete! Robot returned to start.');stopTimer();}
    return;
  }

  const fr=frontiers();
  const cov=covPct();

  if(!fr.length||cov>=96){
    setLog(`Coverage ${cov}% — returning to start...`);
    phase='return'; pendPath=[];
    const p=bfsPath(bot.r,bot.c,[[HOME.r,HOME.c]],true);
    retPath=p?p.slice(1):[];
    if(!retPath.length){phase='done';setLog('Already home! Done.');stopTimer();}
    updateUI(); return;
  }

  if(!pendPath.length){
    const p=bfsPath(bot.r,bot.c,fr,false);
    if(p&&p.length>1) pendPath=p.slice(1);
    else{
      if(cov>=80){
        phase='return';
        const rp=bfsPath(bot.r,bot.c,[[HOME.r,HOME.c]],true);
        retPath=rp?rp.slice(1):[];
      }
      updateUI(); return;
    }
  }

  const[nr,nc]=pendPath.shift();
  if(world[nr][nc]===1){
    bumps++;lo[nr][nc]=L_MAX;pendPath=[];
    setLog(`Bump at (${nr},${nc}) — replanning`);
  } else {
    bot.r=nr;bot.c=nc;steps++;trail.add(K(nr,nc));
    setLog(`Step ${steps} | pos(${nr},${nc}) | coverage:${cov}% | frontiers:${fr.length}`);
  }
  scan(); updateUI();
}

function updateUI(){
  document.getElementById('vSteps').textContent=steps;
  document.getElementById('vCov').textContent=covPct()+'%';
  document.getElementById('vFront').textContent=frontiers().length;
  document.getElementById('vPhase').textContent=phase;
}
function setLog(m){document.getElementById('log').textContent=m;}

function draw(){
  const retSet=new Set(retPath.map(([r,c])=>K(r,c)));
  const fr=phase==='explore'?frontiers():[];
  const frSet=new Set(fr.map(([r,c])=>K(r,c)));

  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const k=K(r,c);

    // ── Real world panel ──
    let wf;
    if(r===bot.r&&c===bot.c)        wf='#27500A';
    else if(r===HOME.r&&c===HOME.c) wf='#97C459';
    else if(world[r][c]===1)        wf='#2C2C2A';
    else                            wf='#EAF3DE';
    gW.fillStyle=wf;
    gW.fillRect(c*SZ+1,r*SZ+1,SZ-2,SZ-2);

    // ── Robot map panel ──
    const p=P(r,c);
    let mf;
    if(r===bot.r&&c===bot.c)            mf=phase==='return'?'#0C447C':'#27500A';
    else if(r===HOME.r&&c===HOME.c)     mf='#97C459';
    else if(p>0.62)                     mf='#2C2C2A';
    else if(retSet.has(k))              mf='#185FA5';
    else if(trail.has(k))               mf='#9FE1CB';
    else if(frSet.has(k))               mf='#EF9F27';
    else if(p<0.38)                     mf='#E1F5EE';
    else                                mf='#888780';
    gM.fillStyle=mf;
    gM.fillRect(c*SZ+1,r*SZ+1,SZ-2,SZ-2);
  }

  // Robot circle — world
  gW.fillStyle='#27500A';
  gW.beginPath();
  gW.arc(bot.c*SZ+SZ/2,bot.r*SZ+SZ/2,SZ/2-1,0,Math.PI*2);
  gW.fill();

  // Robot circle — map
  gM.fillStyle=phase==='return'?'#0C447C':'#27500A';
  gM.beginPath();
  gM.arc(bot.c*SZ+SZ/2,bot.r*SZ+SZ/2,SZ/2-1,0,Math.PI*2);
  gM.fill();

  // Home marker — map
  gM.strokeStyle='#97C459'; gM.lineWidth=2;
  gM.strokeRect(HOME.c*SZ+2,HOME.r*SZ+2,SZ-4,SZ-4);
}

const delays=[500,300,160,100,65,40,25,14,6];
function getDelay(){return delays[parseInt(document.getElementById('spd').value)-1];}

function startStop(){
  if(running){
    stopTimer();
  } else {
    if(phase==='done') return;
    running=true;
    document.getElementById('btnStart').textContent='Pause';
    ticker=setInterval(()=>{doStep();draw();},getDelay());
  }
}
function stopTimer(){
  running=false;
  document.getElementById('btnStart').textContent='Start';
  if(ticker){clearInterval(ticker);ticker=null;}
}
function step10(){stopTimer();for(let i=0;i<10;i++) doStep();draw();}
function newMap(){stopTimer();makeWorld();initState();setLog(`New map — ${totalFree} reachable cells. Press Start.`);}

document.getElementById('spd').oninput=function(){
  document.getElementById('spdLbl').textContent=this.value;
  if(running){stopTimer();startStop();}
};

makeWorld(); initState();
setLog(`${totalFree} reachable cells. Press Start.`);
</script>
</body>
</html>
